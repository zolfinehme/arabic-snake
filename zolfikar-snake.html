<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arabic Snake</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; touch-action:none; }
body {
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(180,120,60,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(120,70,30,0.2)  0%, transparent 50%),
    #1a1008;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; height:100vh;
}
.game-wrapper {
  display:flex; flex-direction:column; align-items:center;
  width:100%; height:100vh; padding:10px; gap:8px;
}
.topbar { width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.game-title { font-size:20px; font-weight:900; color:#d4956a; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
.topbar-right { display:flex; gap:8px; align-items:center; }
.score-pill {
  background:rgba(80,40,10,0.7); border:2px solid #8b5e2a;
  border-radius:50px; padding:5px 14px; font-size:14px; font-weight:900; color:#d4956a;
  box-shadow:inset 0 1px 0 rgba(255,200,80,0.15), 0 2px 8px rgba(0,0,0,0.4);
}
.pause-btn {
  background:rgba(80,40,10,0.7); border:2px solid #8b5e2a;
  color:#d4a060; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
  padding:5px 14px; border-radius:50px; cursor:pointer; transition:all 0.2s;
}
.pause-btn:hover { background:rgba(120,70,20,0.8); color:#d4956a; }
.middle { display:flex; gap:10px; flex:1; width:100%; min-height:0; }
.canvas-wrap {
  position:relative; flex:1; border-radius:16px; overflow:hidden;
  padding:14px;
  background:
    repeating-linear-gradient(92deg, transparent 0px, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px),
    linear-gradient(135deg, #6b3a12 0%, #8b5010 15%, #a06020 25%, #7a4010 40%, #9a5818 55%, #7b4212 70%, #a06020 80%, #6b3a12 100%);
  border:4px solid #3d1f05;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 3px 3px 8px rgba(255,200,100,0.2), inset -3px -3px 8px rgba(0,0,0,0.4), 0 0 0 2px rgba(180,120,40,0.3);
}
.canvas-wrap::before {
  content:''; position:absolute; inset:10px; border-radius:8px;
  border:3px solid rgba(30,12,0,0.6);
  box-shadow:inset 0 0 12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,180,60,0.1);
  pointer-events:none; z-index:2;
}
canvas { display:block; width:100%; height:100%; border-radius:6px; }
.sidebar { width:148px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; }
.side-card {
  background:linear-gradient(160deg, #7a4a18 0%, #5a3010 50%, #7a4a18 100%);
  border:3px solid #3d1f05; border-radius:14px; padding:12px;
  box-shadow: inset 2px 2px 6px rgba(255,180,80,0.15), inset -2px -2px 6px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.4);
}
.side-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:rgba(240,180,80,0.6); margin-bottom:8px; }
.side-word { font-family:'Tajawal',sans-serif; font-size:30px; font-weight:900; direction:rtl; text-align:center; color:#fef3c7; line-height:1.1; transition:all 0.3s; text-shadow:0 0 10px rgba(240,180,80,0.3); }
.side-word.hidden { opacity:0.08; filter:blur(7px); }
.side-meaning { font-size:12px; color:rgba(240,180,80,0.5); text-align:center; margin-top:4px; font-weight:700; }
.toggle-btn {
  width:100%; margin-top:8px; background:rgba(30,12,0,0.4); border:1.5px solid rgba(180,120,40,0.35);
  color:rgba(240,180,80,0.6); font-family:'Nunito',sans-serif; font-size:11px; font-weight:800;
  padding:6px; border-radius:50px; cursor:pointer; transition:all 0.2s;
}
.toggle-btn:hover { border-color:rgba(240,180,80,0.7); color:#d4956a; }
.prog-list { display:flex; flex-direction:column; gap:6px; }
.prog-letter {
  font-family:'Tajawal',sans-serif; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; color:rgba(240,180,80,0.25);
  background:rgba(20,8,0,0.4); border:1.5px solid rgba(120,70,20,0.3);
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.prog-letter.eaten { background:rgba(74,222,128,0.2); border-color:rgba(90,140,90,0.7); color:#6a9e72; transform:scale(1.05); ; }
.prog-letter.next { border-color:rgba(160,110,50,0.8); color:#c8914a; background:rgba(251,191,36,0.12); border-color:rgba(180,130,60,0.8); }
.dpad { display:grid; grid-template-areas:". up ." "left . right" ". down ."; gap:5px; }
.ctrl-btn {
  width:50px; height:50px; border-radius:14px;
  background:linear-gradient(145deg, #8b5010 0%, #6b3a08 100%);
  border:2px solid #3d1f05; color:#d4956a; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.1s; user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
  -webkit-touch-callout:none;
  box-shadow: inset 1px 1px 4px rgba(255,180,60,0.2), inset -1px -1px 4px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.5);
}
.ctrl-btn:active { transform:scale(0.88) translateY(1px); background:linear-gradient(145deg,#6b3a08,#8b5010); color:#c8914a; }
.ctrl-up{grid-area:up;} .ctrl-left{grid-area:left;} .ctrl-right{grid-area:right;} .ctrl-down{grid-area:down;}
.overlay {
  position:absolute; inset:0; background:rgba(10,5,0,0.88); backdrop-filter:blur(14px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; text-align:center; padding:20px; border-radius:8px; z-index:3;
}
.overlay.hidden { display:none; }
.ov-icon { font-size:50px; line-height:1; animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{transform:scale(0) rotate(-15deg);} to{transform:scale(1) rotate(0);} }
.ov-title { font-size:clamp(20px,4vw,30px); font-weight:900; color:#d4956a; ; }
.ov-title.green { color:#6a9e72; ; }
.ov-title.red   { color:#b85c5c; ; }
.ov-word { font-family:'Tajawal',sans-serif; font-size:58px; font-weight:900; color:#c8914a; direction:rtl; line-height:1; color:#c8914a; }
.ov-meaning { font-size:15px; color:rgba(240,180,80,0.5); font-weight:700; }
.ov-sub { font-size:13px; color:rgba(240,180,80,0.35); max-width:260px; line-height:1.6; }
.ov-btn { font-family:'Nunito',sans-serif; font-size:15px; font-weight:900; padding:11px 32px; border:none; border-radius:50px; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; margin-top:4px; }
.ov-btn.g { background:linear-gradient(135deg,#4ade80,#16a34a); color:#052e16; box-shadow:0 6px 20px rgba(74,222,128,0.4); }
.ov-btn.g:hover { transform:translateY(-2px) scale(1.03); }
.ov-btn.r { background:linear-gradient(135deg,#f87171,#dc2626); color:#fff; box-shadow:0 6px 20px rgba(248,113,113,0.4); }
.ov-btn.r:hover { transform:translateY(-2px) scale(1.03); }
.ov-btn.y { background:linear-gradient(135deg,#fbbf24,#d97706); color:#1a0800; box-shadow:0 6px 20px rgba(251,191,36,0.4); }
.ov-btn.y:hover { transform:translateY(-2px) scale(1.03); }
.flash { position:absolute; inset:0; border-radius:8px; pointer-events:none; opacity:0; transition:opacity 0.08s; z-index:4; }
.flash.green { background:radial-gradient(circle at center, rgba(74,222,128,0.3) 0%, transparent 70%); }
.flash.red   { background:radial-gradient(circle at center, rgba(248,113,113,0.35) 0%, transparent 70%); }
.flash.show  { opacity:1; }
@media(max-width:480px){ .sidebar{width:110px;} .side-word{font-size:24px;} .ctrl-btn{width:52px;height:52px;font-size:20px;} .canvas-wrap{padding:10px;} }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="topbar">
    <div class="game-title">🐍 Arabic Snake</div>
    <div class="topbar-right">
      <div class="score-pill">⭐ <span id="score-val">0</span></div>
      <button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
    </div>
  </div>
  <div class="middle">
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="gc"></canvas>
      <div class="flash" id="flash"></div>
      <div class="overlay" id="start-overlay">
        <div class="ov-icon">🐍</div>
        <div class="ov-title">Arabic Snake</div>
        <div class="ov-sub">Eat the letters in the correct order to spell the word. Wrong letter or wall = bounce!</div>
        <button class="ov-btn g" onclick="startGame()">Start Game 🚀</button>
      </div>
      <div class="overlay hidden" id="ready-overlay">
        <div class="ov-icon">👀</div>
        <div class="ov-title">Get Ready!</div>
        <div class="ov-word" id="ready-word"></div>
        <div class="ov-meaning" id="ready-meaning"></div>
        <div class="ov-sub">Memorise the word — eat the letters in order!</div>
        <button class="ov-btn g" onclick="beginRound()">I'm Ready! 🐍</button>
      </div>
      <div class="overlay hidden" id="round-overlay">
        <div class="ov-icon">🎉</div>
        <div class="ov-title green">Word Complete!</div>
        <div class="ov-sub" id="round-msg"></div>
        <button class="ov-btn g" onclick="nextRound()">Next Word →</button>
      </div>
      <div class="overlay hidden" id="pause-overlay">
        <div class="ov-icon">⏸</div>
        <div class="ov-title">Paused</div>
        <div class="ov-sub">The snake is waiting...</div>
        <button class="ov-btn y" onclick="togglePause()">▶ Resume</button>
      </div>
      <div class="overlay hidden" id="over-overlay">
        <div class="ov-icon">💥</div>
        <div class="ov-title red">Game Over!</div>
        <div class="ov-sub" id="over-msg"></div>
        <button class="ov-btn r" onclick="restartGame()">Try Again 🔄</button>
      </div>
      <div class="overlay hidden" id="done-overlay">
        <div class="ov-icon">🏆</div>
        <div class="ov-title green">All Done!</div>
        <div class="ov-sub" id="done-msg"></div>
        <button class="ov-btn g" onclick="restartGame()">Play Again 🔄</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="side-card">
        <div class="side-label">Spell this</div>
        <div class="side-word hidden" id="side-word">كتاب</div>
        <div class="side-meaning" id="side-meaning">= Book</div>
        <button class="toggle-btn" id="toggle-btn" onclick="toggleWord()">👁 Show Word</button>
      </div>
      <div class="side-card">
        <div class="side-label">Progress</div>
        <div class="prog-list" id="prog-letters"></div>
      </div>
    </div>
  </div>
  <div class="controls-bar">
    <div class="dpad">
      <button class="ctrl-btn ctrl-up"    ontouchstart="event.preventDefault();setDir(0,-1)" onclick="setDir(0,-1)">▲</button>
      <button class="ctrl-btn ctrl-left"  ontouchstart="event.preventDefault();setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
      <button class="ctrl-btn ctrl-right" ontouchstart="event.preventDefault();setDir(1,0)"  onclick="setDir(1,0)">▶</button>
      <button class="ctrl-btn ctrl-down"  ontouchstart="event.preventDefault();setDir(0,1)"  onclick="setDir(0,1)">▼</button>
    </div>
  </div>
</div>
<script>
const words=[
  {arabic:'كتاب', letters:['ك','ت','ا','ب'], meaning:'Book'},
  {arabic:'بيت',  letters:['ب','ي','ت'],     meaning:'House'},
  {arabic:'ماء',  letters:['م','ا','ء'],     meaning:'Water'},
  {arabic:'نور',  letters:['ن','و','ر'],     meaning:'Light'},
  {arabic:'قلب',  letters:['ق','ل','ب'],     meaning:'Heart'},
  {arabic:'شمس',  letters:['ش','م','س'],     meaning:'Sun'},
  {arabic:'قمر',  letters:['ق','م','ر'],     meaning:'Moon'},
  {arabic:'باب',  letters:['ب','ا','ب'],     meaning:'Door'},
];
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const CELL=28;
let COLS,ROWS,DPR=1;
function resizeCanvas(){
  const wrap=document.getElementById('canvas-wrap');
  const pad=28;
  DPR=window.devicePixelRatio||1;
  const availW=wrap.clientWidth-pad;
  const availH=wrap.clientHeight-pad;
  COLS=Math.floor(availW/CELL);
  ROWS=Math.floor(availH/CELL);
  // Scale canvas for device pixel ratio (fixes blur on mobile)
  canvas.width=COLS*CELL*DPR; canvas.height=ROWS*CELL*DPR;
  canvas.style.width=COLS*CELL+'px'; canvas.style.height=ROWS*CELL+'px';
  ctx.scale(DPR,DPR);
}
let snake,prevSnake,dir,nextDir,letters,eaten,score,wordIdx,wordHidden,paused,running;
let lastTick=0,rafId=null;
const TICK=210;
function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my},{x:mx-3,y:my}];
  prevSnake=snake.map(s=>({...s}));
  dir={x:1,y:0}; nextDir={x:1,y:0}; eaten=0;
  spawnLetters(); renderProgress();
}
function spawnLetters(){
  const word=words[wordIdx]; letters=[];
  const used=new Set(snake.map(s=>`${s.x},${s.y}`));
  word.letters.forEach((ch,i)=>{
    let pos,tries=0;
    do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};tries++;}
    while((used.has(`${pos.x},${pos.y}`)||letters.some(l=>l.x===pos.x&&l.y===pos.y))&&tries<300);
    letters.push({x:pos.x,y:pos.y,ch,idx:i});
    used.add(`${pos.x},${pos.y}`);
  });
}
function renderProgress(){
  const word=words[wordIdx];
  document.getElementById('prog-letters').innerHTML=word.letters.map((ch,i)=>
    `<div class="prog-letter ${i<eaten?'eaten':i===eaten?'next':''}">${ch}</div>`).join('');
}
function updateWordDisplay(){
  const w=words[wordIdx];
  document.getElementById('side-word').textContent=w.arabic;
  document.getElementById('side-meaning').textContent=`= ${w.meaning}`;
}
function toggleWord(){
  wordHidden=!wordHidden;
  document.getElementById('side-word').classList.toggle('hidden',wordHidden);
  document.getElementById('toggle-btn').textContent=wordHidden?'👁 Show Word':'🙈 Hide Word';
}
function togglePause(){
  if(!running&&!paused) return;
  paused=!paused;
  if(paused){ showOverlay('pause-overlay'); document.getElementById('pause-btn').textContent='▶ Resume'; }
  else{ hideAllOverlays(); document.getElementById('pause-btn').textContent='⏸ Pause'; lastTick=performance.now(); rafId=requestAnimationFrame(loop); }
}
function setDir(x,y){ if(paused||!running) return; if(x===-dir.x&&y===-dir.y) return; nextDir={x,y}; }
document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':    e.preventDefault();setDir(0,-1);break;
    case'ArrowDown':  e.preventDefault();setDir(0,1); break;
    case'ArrowLeft':  e.preventDefault();setDir(-1,0);break;
    case'ArrowRight': e.preventDefault();setDir(1,0); break;
    case'Escape':case'p':case'P': if(running) togglePause(); break;
  }
});
// Touch controls — use touchstart for zero delay on mobile
let tx=0,ty=0,tMoved=false;
document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; tMoved=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(tMoved) return;
  const dx=e.touches[0].clientX-tx, dy=e.touches[0].clientY-ty;
  if(Math.abs(dx)<8&&Math.abs(dy)<8) return;
  tMoved=true;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
},{passive:true});
function doFlash(type){ const el=document.getElementById('flash'); el.className=`flash ${type} show`; setTimeout(()=>el.classList.remove('show'),200); }
function loop(ts){
  if(!running||paused) return;
  const dt=ts-lastTick, frac=Math.min(dt/TICK,1);
  draw(frac);
  if(dt>=TICK){ lastTick=ts; prevSnake=snake.map(s=>({...s})); tick(); }
  if(running&&!paused) rafId=requestAnimationFrame(loop);
}
function tick(){
  dir={...nextDir};
  const hx=snake[0].x+dir.x, hy=snake[0].y+dir.y;
  // Wall = bounce (no death)
  if(hx<0||hx>=COLS||hy<0||hy>=ROWS){ doFlash('red'); return; }
  const head={x:hx,y:hy};
  // Self = game over
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){ gameOver('You bit yourself! 😬'); return; }
  const hit=letters.find(l=>l.x===head.x&&l.y===head.y);
  if(hit){
    if(hit.idx===eaten){
      doFlash('green'); score+=10; document.getElementById('score-val').textContent=score;
      snake.unshift(head); letters=letters.filter(l=>l!==hit); eaten++; renderProgress();
      if(eaten===words[wordIdx].letters.length){
        running=false;
        setTimeout(()=>{ document.getElementById('round-msg').textContent=`"${words[wordIdx].arabic}" = ${words[wordIdx].meaning} ✅ +${eaten*10} pts!`; showOverlay('round-overlay'); },300);
        return;
      }
    } else { doFlash('red'); return; }
  } else { snake.unshift(head); snake.pop(); }
}
function gameOver(msg){
  running=false; cancelAnimationFrame(rafId); doFlash('red');
  document.getElementById('over-msg').textContent=msg+` Score: ${score}`;
  setTimeout(()=>showOverlay('over-overlay'),350);
}
function draw(frac=0){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Google Snake green checkerboard
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){
    ctx.fillStyle=(x+y)%2===0?'#aad751':'#a2d149';
    ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
  }
  const now=performance.now()/1000;
  // Letters
  letters.forEach(l=>{
    const isNext=l.idx===eaten;
    const cx=l.x*CELL+CELL/2, cy=l.y*CELL+CELL/2;
    const pulse=isNext?Math.sin(now*3.5)*0.08+1:1;
    const r=CELL*0.42*pulse;
    if(isNext){
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.8);
      grd.addColorStop(0,'rgba(180,90,50,0.25)'); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r*3,0,Math.PI*2); ctx.fill();
    }
    const grad=ctx.createRadialGradient(cx-r*0.3,cy-r*0.35,r*0.05,cx,cy,r);
    if(isNext){ grad.addColorStop(0,'#d4876a'); grad.addColorStop(0.5,'#b85c3a'); grad.addColorStop(1,'#7a3a20'); }
    else       { grad.addColorStop(0,'#9ab8a0'); grad.addColorStop(0.5,'#5a8a68'); grad.addColorStop(1,'#3a6048'); }
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.arc(cx-r*0.28,cy-r*0.3,r*0.25,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`900 ${Math.floor(CELL*0.48)}px Tajawal,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(l.ch,cx,cy+1);
  });
  if(!snake.length) return;
  const headCur=snake[0],headPrev=prevSnake[0]||headCur;
  const hx2=(headPrev.x+(headCur.x-headPrev.x)*frac)*CELL+CELL/2;
  const hy2=(headPrev.y+(headCur.y-headPrev.y)*frac)*CELL+CELL/2;
  const R=CELL*0.44;
  ctx.lineCap='round'; ctx.lineJoin='round';
  // Shadow
  ctx.beginPath(); ctx.moveTo(hx2,hy2+2);
  for(let i=1;i<snake.length;i++){ const s=snake[i],p=prevSnake[i]||s; ctx.lineTo((p.x+(s.x-p.x)*frac)*CELL+CELL/2,(p.y+(s.y-p.y)*frac)*CELL+CELL/2+2); }
  ctx.lineWidth=R*2; ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(hx2,hy2);
  for(let i=1;i<snake.length;i++){ const s=snake[i],p=prevSnake[i]||s; ctx.lineTo((p.x+(s.x-p.x)*frac)*CELL+CELL/2,(p.y+(s.y-p.y)*frac)*CELL+CELL/2); }
  ctx.lineWidth=R*2; ctx.strokeStyle='#4a7c59'; ctx.stroke();
  // Highlight
  ctx.beginPath(); ctx.moveTo(hx2,hy2);
  for(let i=1;i<snake.length;i++){ const s=snake[i],p=prevSnake[i]||s; ctx.lineTo((p.x+(s.x-p.x)*frac)*CELL+CELL/2,(p.y+(s.y-p.y)*frac)*CELL+CELL/2); }
  ctx.lineWidth=R*0.75; ctx.strokeStyle='rgba(100,180,100,0.4)'; ctx.stroke();
  // Eaten letters on body
  for(let i=1;i<=Math.min(eaten,snake.length-1);i++){
    const s=snake[i],p=prevSnake[i]||s;
    const sx=(p.x+(s.x-p.x)*frac)*CELL+CELL/2,sy=(p.y+(s.y-p.y)*frac)*CELL+CELL/2;
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`900 ${Math.floor(CELL*0.44)}px Tajawal,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(words[wordIdx]?.letters[i-1]) ctx.fillText(words[wordIdx].letters[i-1],sx,sy+1);
  }
  // Head
  const hGrad=ctx.createRadialGradient(hx2-R*0.25,hy2-R*0.25,0,hx2,hy2,R);
  hGrad.addColorStop(0,'#6abf7b'); hGrad.addColorStop(0.6,'#3d7a52'); hGrad.addColorStop(1,'#2a5c3a');
  ctx.beginPath(); ctx.arc(hx2,hy2,R,0,Math.PI*2); ctx.fillStyle=hGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(hx2-R*0.22,hy2-R*0.25,R*0.28,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  // Eyes
  const eyeR=R*0.22;
  const perpX=-dir.y,perpY=dir.x;
  const ed=R*0.42,ef=R*0.3;
  const e1={x:hx2+perpX*ed+dir.x*ef,y:hy2+perpY*ed+dir.y*ef};
  const e2={x:hx2-perpX*ed+dir.x*ef,y:hy2-perpY*ed+dir.y*ef};
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(e1.x,e1.y,eyeR,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(e2.x,e2.y,eyeR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a3a1a';
  ctx.beginPath();ctx.arc(e1.x+dir.x*eyeR*0.38,e1.y+dir.y*eyeR*0.38,eyeR*0.58,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(e2.x+dir.x*eyeR*0.38,e2.y+dir.y*eyeR*0.38,eyeR*0.58,0,Math.PI*2);ctx.fill();
}
function showReady(){
  const w=words[wordIdx];
  document.getElementById('ready-word').textContent=w.arabic;
  document.getElementById('ready-meaning').textContent=`= ${w.meaning}`;
  showOverlay('ready-overlay'); updateWordDisplay(); renderProgress();
}
function startGame(){
  wordIdx=0; score=0; wordHidden=true; paused=false;
  document.getElementById('score-val').textContent=0;
  document.getElementById('side-word').classList.add('hidden');
  document.getElementById('toggle-btn').textContent='👁 Show Word';
  document.getElementById('pause-btn').textContent='⏸ Pause';
  resizeCanvas(); showReady();
}
function beginRound(){ hideAllOverlays(); init(); running=true; paused=false; lastTick=performance.now(); rafId=requestAnimationFrame(loop); }
function nextRound(){
  wordIdx++;
  if(wordIdx>=words.length){ running=false; document.getElementById('done-msg').textContent=`You scored ${score} pts and spelled all ${words.length} words! 🏆`; showOverlay('done-overlay'); return; }
  showReady();
}
function restartGame(){ startGame(); }
function hideAllOverlays(){ ['start-overlay','ready-overlay','round-overlay','pause-overlay','over-overlay','done-overlay'].forEach(id=>document.getElementById(id).classList.add('hidden')); }
function showOverlay(id){ hideAllOverlays(); document.getElementById(id).classList.remove('hidden'); }
resizeCanvas();
wordIdx=0; eaten=0; score=0; wordHidden=true; paused=false; running=false;
letters=[]; snake=[{x:8,y:5},{x:7,y:5},{x:6,y:5},{x:5,y:5}];
prevSnake=snake.map(s=>({...s}));
dir={x:1,y:0}; nextDir={x:1,y:0};
updateWordDisplay(); renderProgress(); draw(0);
document.getElementById('side-word').classList.add('hidden');
window.addEventListener('resize',()=>{ ctx.setTransform(1,0,0,1,0,0); resizeCanvas(); if(!running) draw(0); });
</script>
